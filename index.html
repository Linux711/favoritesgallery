<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booru Gallery</title>
  <style>
    /* Dark theme and base styles */
    body {
      background: #181a1b;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: #23272a;
      box-shadow: 0 2px 8px #0004;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .search-box {
      flex: 1 1 300px;
      margin-right: 1rem;
      background: #222;
      border: none;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      color: #fff;
      font-size: 1rem;
    }
    .sync-btn {
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.7rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .sync-btn:active {
      background: #4752c4;
    }
    .rating-btn {
      background: #36393f;
      color: #b9bbbe;
      border: none;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .rating-btn:hover {
      background: #7289da;
      color: #fff;
    }
    .rating-btn.active {
      background: #5865f2;
      color: #fff;
    }
    .rating-btn.active:hover {
      background: #4752c4;
      color: #fff;
    }
    .loading {
      text-align: center;
      margin: 2rem 0;
      font-size: 1.2rem;
      color: #aaa;
    }
    .gallery {
      column-count: 4;
      column-gap: 1rem;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 1100px) {
      .gallery { column-count: 2; }
    }
    @media (max-width: 700px) {
      .gallery { column-count: 1; padding: 1rem; }
      header { flex-direction: column; gap: 1rem; }
    }
    .card {
      background: #23272a;
      border-radius: 10px;
      margin-bottom: 1rem;
      display: inline-block;
      width: 100%;
      box-shadow: 0 2px 8px #0006;
      overflow: hidden;
      transition: transform 0.1s;
      cursor: pointer;
      position: relative; /* Added for absolute positioning of tags over the image */
    }
    .card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 6px 16px #0008;
    }
    .thumb {
      width: 100%;
      display: block;
      background: #111;
      height: auto; /* Allow images to display at their natural aspect ratio */
      object-fit: contain; /* Fit entire image without cropping */
    }
    .tags {
      position: absolute; /* Position tags absolutely over the image */
      top: 10px; /* Top padding from image edge */
      left: 10px; /* Left padding from image edge */
      right: 10px; /* Right padding from image edge */
      display: flex;
      flex-wrap: wrap;
      gap: 0.4em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .card:hover .tags {
      opacity: 1;
      pointer-events: auto;
    }
    .pill {
      background: #36393f;
      color: #b9bbbe;
      border-radius: 999px;
      padding: 0.2em 0.9em;
      font-size: 0.92em;
      margin-top: 0.2em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: none;
      outline: none;
    }
    .pill:hover {
      background: #5865f2;
      color: #fff;
    }
    .card-content {
      position: absolute; /* Position rating absolutely over the image */
      bottom: 10px; /* Bottom padding from image edge */
      left: 10px; /* Left padding from image edge */
      padding: 0.7em 1em 0 1em;
      opacity: 0; /* Hidden by default */
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .card:hover .card-content {
      opacity: 1; /* Show on card hover */
      pointer-events: auto;
    }
    .rating {
      font-size: 0.9em;
      color: #aaa;
      margin-bottom: 0.5em;
      opacity: 0; /* Hidden by default */
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .card:hover .rating {
      opacity: 1; /* Show on card hover */
      pointer-events: auto;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #f55;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 1.2em;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card:hover .delete-btn {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- Header with search and sync -->
  <header>
    <input class="search-box" id="search" type="text" placeholder="Search tags..." autocomplete="off" />
    <!-- <button class="sync-btn" id="syncBtn">Sync</button> -->
    <input id="quickSyncLimit" type="number" min="1" max="200" value="10" style="margin-left: 1rem; padding: 0.7rem; border-radius: 6px; border: none; background: #222; color: #fff; font-size: 1rem;" />
    <button class="sync-btn" id="quickSyncBtn">Quick Sync</button>
    <div style="margin-left: 2rem; display: flex; gap: 0.5rem;">
      <button class="rating-btn" data-rating="s">Safe</button>
      <button class="rating-btn" data-rating="q">Questionable</button>
      <button class="rating-btn" data-rating="e">Explicit</button>
    </div>
  </header>
  <div id="loading" class="loading" style="display:none;">Loading...</div>
  <div class="gallery" id="gallery"></div>

  <script>
    // Store all posts in memory for filtering
    let allPosts = [];
    let filteredPosts = [];
    let selectedRatings = new Set(['s']); // Default to show safe and explicit only

    // Utility: Split tag string into array, filter empty
    function parseTags(tagString) {
      return (tagString || '').split(' ').filter(Boolean);
    }

    // Fetch posts from the API
    async function fetchPosts() {
      document.getElementById('loading').style.display = 'block';
      try {
        const res = await fetch('http://localhost:3001/posts');
        allPosts = await res.json();
        filteredPosts = allPosts;
        filterPosts(); // Apply initial filter based on selectedRatings
      } catch (e) {
        document.getElementById('gallery').innerHTML = '<div style="color:#f55">Failed to load posts.</div>';
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Render the gallery with current filteredPosts
    function renderGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      filteredPosts.forEach(post => {
        // Create card element
        const card = document.createElement('div');
        card.className = 'card';
        card.title = `Score: ${post.score} | Rating: ${post.rating}`;
        card.onclick = () => {
          window.open(`https://danbooru.donmai.us/posts/${post.id}`, '_blank');
        };

        // Thumbnail
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = post.large_file_url || post.preview_file_url; // Use large_file_url if available, fallback to preview
        img.alt = 'Preview';
        card.appendChild(img);

        // Card content (rating)
        const content = document.createElement('div');
        content.className = 'card-content';
        content.innerHTML = `<div class="rating">${post.rating ? 'Rating: ' + post.rating.toUpperCase() : ''}</div>`;
        card.appendChild(content);

        // Tags
        const tagsDiv = document.createElement('div');
        tagsDiv.className = 'tags';
        // Artist tags
        parseTags(post.tag_string_artist).forEach(tag => {
          const pill = createTagPill(tag);
          tagsDiv.appendChild(pill);
        });
        // Character tags
        parseTags(post.tag_string_character).forEach(tag => {
          const pill = createTagPill(tag);
          tagsDiv.appendChild(pill);
        });
        // Copyright tags
        parseTags(post.tag_string_copyright).forEach(tag => {
          const pill = createTagPill(tag);
          tagsDiv.appendChild(pill);
        });
        card.appendChild(tagsDiv);

        // Delete button
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '×';
        deleteBtn.onclick = (e) => {
          e.stopPropagation();
          if (confirm('Delete this post from your gallery?')) {
            fetch(`http://localhost:3001/delete?id=${post.id}`, { method: 'POST' })
              .then(() => fetchPosts())
              .catch(() => alert('Delete failed.'));
          }
        };
        card.appendChild(deleteBtn);

        gallery.appendChild(card);
      });
    }

    // Create a tag pill element
    function createTagPill(tag) {
      const pill = document.createElement('button');
      pill.className = 'pill';
      pill.textContent = tag;
      pill.onclick = (e) => {
        e.stopPropagation();
        document.getElementById('search').value = tag;
        filterPosts();
      };
      return pill;
    }

    // Filter posts based on search box and rating filter
    function filterPosts() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      let filtered = allPosts;

      // Apply search filter
      if (q) {
        filtered = filtered.filter(post => {
          return (
            (post.tag_string_artist && post.tag_string_artist.toLowerCase().includes(q)) ||
            (post.tag_string_character && post.tag_string_character.toLowerCase().includes(q)) ||
            (post.tag_string_copyright && post.tag_string_copyright.toLowerCase().includes(q)) ||
            (post.tag_string_general && post.tag_string_general.toLowerCase().includes(q))
          );
        });
      }

      // Apply rating filter
      if (selectedRatings.size > 0) {
        filtered = filtered.filter(post => selectedRatings.has(post.rating));
      }

      filteredPosts = filtered;
      renderGallery();
    }

    // Sync posts from the backend
    async function syncPosts() {
      document.getElementById('loading').style.display = 'block';
      try {
        const response = await fetch('http://localhost:3001/sync?login=xx99');
        const data = await response.json();
        await fetchPosts(); // Refresh gallery
        alert(`Sync successful! Synced ${data.synced} posts.`);
      } catch (e) {
        alert('Sync failed.');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Quick sync: only last 50 favorites
    async function quickSyncPosts() {
      const limit = document.getElementById('quickSyncLimit').value || 50; // Get limit from input, default to 50
      document.getElementById('loading').style.display = 'block';
      try {
        const response = await fetch(`http://localhost:3001/sync?login=xx99&limit=${limit}`);
        const data = await response.json();
        await fetchPosts(); // Refresh gallery
        alert(`Quick sync (last ${limit}) successful! Synced ${data.synced} posts.`);
      } catch (e) {
        alert('Quick sync failed.');
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Event listeners
    document.getElementById('search').addEventListener('input', filterPosts);
    // document.getElementById('syncBtn').addEventListener('click', syncPosts);
    document.getElementById('quickSyncBtn').addEventListener('click', quickSyncPosts);

    // Rating filter buttons
    document.querySelectorAll('.rating-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const rating = e.target.dataset.rating;
        if (selectedRatings.has(rating)) {
          selectedRatings.delete(rating);
        } else {
          selectedRatings.add(rating);
        }
        // Update active class
        document.querySelectorAll('.rating-btn').forEach(b => {
          if (selectedRatings.has(b.dataset.rating)) {
            b.classList.add('active');
          } else {
            b.classList.remove('active');
          }
        });
        filterPosts();
      });
    });

    // Set default active rating buttons (safe and explicit selected)
    document.querySelectorAll('.rating-btn').forEach(b => {
      if (selectedRatings.has(b.dataset.rating)) {
        b.classList.add('active');
      }
    });

    // Initial load
    fetchPosts();
  </script>
</body>
</html>
